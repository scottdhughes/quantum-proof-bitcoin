# 3-node local devnet for testing reorgs and chain splits
# Usage: docker-compose -f docker-compose.3node.yml up -d

services:
  # Miner node - primary block producer
  miner:
    build: .
    container_name: qpb-miner
    environment:
      - QPB_CHAIN=devnet
      - QPB_DATADIR=/data
      - QPB_RPC_ADDR=0.0.0.0:38332
    command: >
      /usr/local/bin/qpb-node
      --chain=devnet
      --datadir=/data
      --rpc-addr=0.0.0.0:38332
      --chainparams=/etc/qpb/chainparams.json
      --listen
      --port=38333
    volumes:
      - miner-data:/data
    ports:
      - "38332:38332"  # RPC
      - "38333:38333"  # P2P
    networks:
      - qpb-local
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:38332/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Node 1 - follows miner
  node1:
    build: .
    container_name: qpb-node1
    environment:
      - QPB_CHAIN=devnet
      - QPB_DATADIR=/data
      - QPB_RPC_ADDR=0.0.0.0:38342
    command: >
      /usr/local/bin/qpb-node
      --chain=devnet
      --datadir=/data
      --rpc-addr=0.0.0.0:38342
      --chainparams=/etc/qpb/chainparams.json
      --listen
      --port=38343
      --p2p-connect=miner:38333
    volumes:
      - node1-data:/data
    ports:
      - "38342:38342"  # RPC
      - "38343:38343"  # P2P
    networks:
      - qpb-local
    depends_on:
      miner:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:38342/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Node 2 - follows miner
  node2:
    build: .
    container_name: qpb-node2
    environment:
      - QPB_CHAIN=devnet
      - QPB_DATADIR=/data
      - QPB_RPC_ADDR=0.0.0.0:38352
    command: >
      /usr/local/bin/qpb-node
      --chain=devnet
      --datadir=/data
      --rpc-addr=0.0.0.0:38352
      --chainparams=/etc/qpb/chainparams.json
      --listen
      --port=38353
      --p2p-connect=miner:38333
    volumes:
      - node2-data:/data
    ports:
      - "38352:38352"  # RPC
      - "38353:38353"  # P2P
    networks:
      - qpb-local
    depends_on:
      miner:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:38352/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  miner-data:
  node1-data:
  node2-data:

networks:
  qpb-local:
    driver: bridge
