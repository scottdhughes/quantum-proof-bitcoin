version: '3.8'

services:
  # Single node configuration (devnet)
  qpb-node:
    build: .
    container_name: qpb-node
    environment:
      - QPB_CHAIN=devnet
      - QPB_DATADIR=/data
      - QPB_RPC_ADDR=0.0.0.0:38332
    volumes:
      - qpb-data:/data
    ports:
      - "38333:38333"  # P2P
      - "38332:38332"  # RPC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38332/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Multi-node testnet configuration
  # For local multi-node testing, use docker-compose.3node.yml instead
  # For production testnet deployment, see deploy/testnet/

volumes:
  qpb-data:
