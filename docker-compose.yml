version: '3.8'

services:
  # Single node configuration
  qpb-node:
    build: .
    container_name: qpb-node
    environment:
      - QPB_CHAIN=devnet
      - QPB_DATADIR=/data
      - QPB_RPC_ADDR=0.0.0.0:28332
    volumes:
      - qpb-data:/data
    ports:
      - "28333:28333"  # P2P
      - "28332:28332"  # RPC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:28332/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

