name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Vectors up-to-date
        run: |
          cargo run --quiet --bin gen_vectors
          git diff --exit-code -- vectors/
      - name: Run tests
        run: cargo test --all-features

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Clippy
        run: cargo clippy --all-features -- -D warnings
      - name: Fmt
        run: cargo fmt -- --check

  bench:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    # Only run benches on manual dispatch to keep push/PR fast and green.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Bench (no run)
        run: cargo bench --features benches-shrincs,shrincs-ffi --no-run
