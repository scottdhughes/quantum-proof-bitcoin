name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI_FAILFAST_TEST_LEAVE_DANGLING: 1

defaults:
  run:
    shell: bash

jobs:
  ci-inventory:
    name: 'CI inventory'
    runs-on: ubuntu-24.04
    if: ${{ vars.SKIP_BRANCH_PUSH != 'true' || github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.ref || '' }}
      - name: Validate CI inventory
        run: |
          python3 ci/test/check_ci_inventory.py
          python3 -m unittest discover -s ci/test -p 'test_*.py'

  linux-pq-tranche:
    name: 'Linux native PQ tranche'
    runs-on: ubuntu-24.04
    if: ${{ vars.SKIP_BRANCH_PUSH != 'true' || github.event_name == 'pull_request' }}
    timeout-minutes: 75
    env:
      DANGER_CI_ON_HOST_FOLDERS: 1
      FILE_ENV: './ci/test/00_setup_env_native_pq_tranche.sh'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.ref || '' }}
      - name: Configure environment
        uses: ./.github/actions/configure-environment
      - name: Restore caches
        uses: ./.github/actions/restore-caches
      - name: Configure Docker
        uses: ./.github/actions/configure-docker
        with:
          cache-provider: gha
      - name: CI script
        run: ./ci/test_run_all.sh
      - name: Save caches
        uses: ./.github/actions/save-caches

  lint:
    name: 'lint'
    runs-on: ubuntu-24.04
    if: ${{ vars.SKIP_BRANCH_PUSH != 'true' || github.event_name == 'pull_request' }}
    timeout-minutes: 45
    env:
      CONTAINER_NAME: "bitcoin-linter"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.ref || '' }}
          fetch-depth: 0
      - name: Configure Docker
        uses: ./.github/actions/configure-docker
        with:
          cache-provider: gha
      - name: CI script
        run: |
          set -o xtrace
          docker buildx build -t "$CONTAINER_NAME" $DOCKER_BUILD_CACHE_ARG --file "./ci/lint_imagefile" .
          CIRRUS_PR_FLAG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CIRRUS_PR_FLAG="-e CIRRUS_PR=1"
          fi
          docker run --rm $CIRRUS_PR_FLAG -v "$(pwd)":/bitcoin "$CONTAINER_NAME"
